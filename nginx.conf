# Load balancer: strict round-robin across the 3 API replicas, no adaptive
# heuristics (challenge fairness rule). Tuned for low tail latency and maximum
# throughput on a CPU-constrained box.

# One worker: under a sub-core CPU quota (cpus: 0.8) two workers only fragment
# the upstream keep-alive pool (each worker keeps its own), causing more upstream
# reconnects per request. A single worker keeps one warm, unified pool and
# avoids cross-worker accept contention. (Throughput is the same CPU budget
# either way; this just spends less of it on overhead.)
worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    access_log off;            # logging is pure overhead on the hot path
    error_log /dev/stderr error;

    tcp_nodelay on;            # never sit on a small response (tail latency)
    server_tokens off;
    reset_timedout_connection on;

    # Client-facing keep-alive: let k6 hold connections open across the run.
    keepalive_timeout 65;
    keepalive_requests 1000000;

    # Strict round-robin (default LB method). max_fails=0 disables passive
    # ejection so the distribution stays exactly even — what the LB verifier
    # checks via X-Instance-Id.
    upstream api {
        server api-1:8000 max_fails=0;
        server api-2:8000 max_fails=0;
        server api-3:8000 max_fails=0;
        keepalive 512;                 # warm upstream pool -> few reconnects
        keepalive_requests 1000000;
        keepalive_timeout 60s;
    }

    server {
        listen 80 reuseport backlog=16384 deferred default_server;

        # Liveness is answered locally by the LB (must not touch storage and
        # must not perturb the app). The round-robin verifier uses /readyz,
        # which is proxied, so this is safe.
        location = /healthz {
            add_header Content-Type text/plain always;
            return 200 "ok";
        }

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_socket_keepalive on;

            # Small JSON / empty 202s: stream both request and response without
            # buffering to cut copies, latency, and LB memory. 70% of traffic
            # is small POST bodies, so request buffering off helps too.
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_buffer_size 4k;

            proxy_connect_timeout 2s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;

            proxy_next_upstream off;
        }
    }
}
